<section class="editorial-hero editorial-hero-compact">
  <div class="editorial-container">
    <p class="editorial-kicker" data-i18n="heroEyebrow"></p>
    <h1 class="editorial-title" data-i18n="heroTitle"></h1>
    <p class="editorial-lead" data-i18n="heroLead"></p>
  </div>
</section>

<section class="editorial-section">
  <div class="editorial-container editorial-two-column">
    <div class="editorial-paper-card">
      <input class="sr-only" type="file" accept="application/pdf" id="file-input">
      <div class="drop-zone" id="drop-zone" role="button" tabindex="0">
        <h2 class="editorial-card-title" data-i18n="dropTitle"></h2>
        <p class="editorial-card-lead" data-i18n="dropLead"></p>
        <button class="editorial-button editorial-button-primary" type="button" id="select-btn" data-i18n="chooseButton"></button>
      </div>
      <div class="mt-4 rounded-lg bg-slate-50 p-4" id="file-banner">
        <strong id="file-name"></strong>
        <span class="ml-2" data-i18n="pageCountLabel"></span> <strong id="page-count">0</strong>
        <button class="ml-3 text-sm font-semibold text-red-700" type="button" disabled id="clear-btn" data-i18n="clearButton"></button>
      </div>
      <div class="mt-4 hidden items-center gap-3 text-sm text-slate-600" id="loading-indicator"><span data-i18n="loadingLabel"></span><span id="loading-text"></span></div>
    </div>
    <div class="editorial-paper-card">
      <h2 class="editorial-card-title" data-i18n="optionsTitle"></h2>
    </div>
  </div>
</section>

<section class="editorial-ad-band" data-ad-container>
  <div class="editorial-container">
    <ins class="adsbygoogle ad-unit editorial-ad-slot" style="display:none" data-ad-status="unfilled" data-ad-client="ca-pub-2913395948188969" data-ad-slot="6363231932" data-ad-format="auto" data-full-width-responsive="true"></ins>
  </div>
</section>

<section class="editorial-section">
      
      <div class="mt-4" id="preview-area"><div class="editorial-card-grid" id="page-grid"></div></div>
      <div class="editorial-actions">
        <button class="editorial-button editorial-button-secondary" type="button" disabled id="rotate-all-btn" data-i18n="rotateAllButton"></button>
        <button class="editorial-button editorial-button-primary" type="button" disabled id="export-btn" data-i18n="primaryButton"></button>
      </div>
    </div>
  </div>
</section>
