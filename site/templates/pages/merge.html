<section class="editorial-hero editorial-hero-compact">
  <div class="editorial-container">
    <p class="editorial-kicker" data-i18n="heroEyebrow"></p>
    <h1 class="editorial-title" data-i18n="heroTitle"></h1>
    <p class="editorial-lead" data-i18n="heroLead"></p>
  </div>
</section>

<section class="editorial-section">
  <div class="editorial-container editorial-two-column">
    <div class="editorial-paper-card">
      <input class="sr-only" type="file" accept="application/pdf" multiple data-file-input>
      <div class="drop-zone" role="button" tabindex="0" data-drop-zone>
        <h2 class="editorial-card-title" data-i18n="dropTitle"></h2>
        <p class="editorial-card-lead" data-i18n="dropLead"></p>
        <button class="editorial-button editorial-button-primary" type="button" data-select-files data-i18n="chooseButton"></button>
      </div>
      <p class="mt-4 text-sm text-slate-600" data-file-summary data-i18n="emptySummary"></p>
      <div class="mt-4" data-file-list>
        <div class="rounded-lg border border-dashed border-slate-300 p-5 text-center text-sm leading-6 text-slate-500" data-i18n="emptyList"></div>
      </div>
      <p class="mt-4 hidden rounded-lg bg-amber-50 p-3 text-sm text-amber-800" data-large-file-tip data-i18n="largeFileTip"></p>
    </div>
    <div class="editorial-paper-card">
      <h2 class="editorial-card-title" data-i18n="optionsTitle"></h2>
    </div>
  </div>
</section>

<section class="editorial-ad-band" data-ad-container>
  <div class="editorial-container">
    <ins class="adsbygoogle ad-unit editorial-ad-slot" style="display:none" data-ad-status="unfilled" data-ad-client="XXXXXXXXXXXXXXXXXXXXXXXX" data-ad-slot="6363231932" data-ad-format="auto" data-full-width-responsive="true"></ins>
  </div>
</section>

<section class="editorial-section">
    
      <p class="editorial-card-lead" data-i18n="optionsLead"></p>
      <div class="progress-track mt-5">
        <span data-progress-fill></span>
      </div>
      <div class="mt-2 flex justify-between text-sm font-semibold text-slate-600">
        <span data-progress-label data-i18n="progressReady"></span>
        <span data-progress-percent>0%</span>
      </div>
      <p class="mt-4 hidden rounded-lg bg-red-50 p-3 text-sm text-red-700" data-error-box></p>
      <div class="editorial-actions">
        <button class="editorial-button editorial-button-primary" type="button" disabled data-merge-button data-i18n="primaryButton"></button>
        <button class="editorial-button editorial-button-secondary" type="button" disabled data-clear-files data-i18n="clearButton"></button>
        <button class="editorial-button editorial-button-secondary" type="button" disabled data-demo-reset data-i18n="resetButton"></button>
      </div>
      <article class="editorial-paper-card mt-6" data-result-card>
        <h3 data-i18n="resultTitle"></h3>
        <p data-result-meta data-i18n="resultLead"></p>
        <a class="editorial-button editorial-button-primary mt-4" href="#" download data-download-link data-i18n="downloadButton"></a>
      </article>
    </div>
  </div>
</section>

<section class="editorial-section">
  <div class="editorial-container editorial-narrow">
    <h2 data-i18n="faqTitle"></h2>
    <div class="editorial-faq-list">
      <article class="editorial-paper-card"><h3 data-i18n="faqOneQuestion"></h3><p data-i18n="faqOneAnswer"></p></article>
      <article class="editorial-paper-card"><h3 data-i18n="faqTwoQuestion"></h3><p data-i18n="faqTwoAnswer"></p></article>
    </div>
  </div>
</section>
